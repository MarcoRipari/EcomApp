name: Check Foto Manuale

# Permette l'avvio manuale del workflow dall'interfaccia di GitHub (tab Actions)
on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout del codice
        uses: actions/checkout@v4

      # 2. Configura l'ambiente Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Puoi usare la versione che preferisci

      # 3. Installa le librerie necessarie
      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp gspread google-auth

      # 4. Esegue lo script passando i secret come variabili d'ambiente
      - name: Esecuzione script Python
        env:
          FOTO_GSHEET_ID: ${{ secrets.FOTO_GSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python scripts/fast_check_foto.py
